home.hero.sb: "{0} on kieliaineistojen tutkimusinfrastruktuuri. Luomme ja ylläpidämme kieliaineistoja uusimmilla kieliteknologisilla menetelmillä tutkijoiden käyttöön, ja tarjoamme avointa pääsyä aina kun mahdollista."
home.hero.mink: "{0} tuo Språkbanken Textin tutkimusinfrastruktuurin tutkijoiden käyttöön. Minkissä voit soveltaa kieliteknologisia menetelmiämme itse keräämääsi tekstiaineistoon. Tulokset voi ladata tai tuoda tutkimustyökaluihimme, kuten Korpiin ja Strixiin, kirjautumisen taakse."
home.hero.privacy: Lähdeaineistosi ja tulokset ovat yksityisiä (katso {0}). Tulevissa versioissa voit jakaa aineistoja tiimien kanssa ja julkaista niitä avoimesti.
