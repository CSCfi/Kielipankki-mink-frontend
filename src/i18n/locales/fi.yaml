metadata.public_id.help: Minkissä jokaisella resurssilla on kiinteä tunniste. Julkinen tunniste on se, jonka tämä resurssi saa kun se viedään tietovarastoon. Pyri tekemään siitä tunnistettava ja kuvaava, muttei liian pitkä. Se saa sisältää vain pieniä kirjaimia, numeroita ja tavuviivoja, ja sen on alettava organisaatiosi etuliitteellä.
metadata.public_id.error.format: Julkinen tunniste saa sisältää vain pieniä kirjaimia (a-z), numeroita (0-9) ja tavuviivoja (-). Se ei saa alkaa tai päättyä tavuviivalla.
